<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 - 渐变风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.5);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .name {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 15px;
            opacity: 0.9;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .content {
            padding: 40px 30px 30px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            margin-right: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            font-size: 15px;
            color: #555;
            transition: transform 0.2s ease;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item:hover {
            transform: translateX(5px);
        }

        .info-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-right: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 16px;
        }

        .info-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            padding: 6px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .bio {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            background-color: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .link-icon:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .card {
                border-radius: 20px;
            }

            .header {
                padding: 30px 20px;
            }

            .avatar {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }

            .name {
                font-size: 26px;
            }

            .content {
                padding: 30px 20px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="avatar">👤</div>
            <div class="name">张明</div>
            <div class="title">全栈开发工程师</div>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">关于我</div>
                <div class="bio">热爱编程，专注于Web开发。拥有5年软件开发经验，擅长前后端技术栈，追求优雅的代码和良好的用户体验。乐于分享技术，持续学习成长。</div>
            </div>
            <div class="section">
                <div class="section-title">联系我</div>
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <span class="info-text">zhangming@example.com</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📱</span>
                    <span class="info-text">+86 138 0000 0000</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📍</span>
                    <span class="info-text">北京市朝阳区</span>
                </div>
            </div>
            <div class="section">
                <div class="section-title">技术技能</div>
                <div class="tags">
                    <span class="tag">JavaScript</span>
                    <span class="tag">TypeScript</span>
                    <span class="tag">React</span>
                    <span class="tag">Node.js</span>
                    <span class="tag">Python</span>
                    <span class="tag">MongoDB</span>
                    <span class="tag">Vue</span>
                    <span class="tag">Docker</span>
                </div>
            </div>
            <div class="links">
                <div class="link-icon">🔗</div>
                <div class="link-icon">🐙</div>
                <div class="link-icon">💼</div>
            </div>
        </div>
    </div>
</body>
</html>
