<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 - 深色风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f0f0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            color: white;
            padding: 45px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 255, 0.5);
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .name {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #00ffff 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title {
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            color: #aaa;
        }

        .content {
            padding: 35px 30px;
        }

        .section {
            margin-bottom: 26px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 11px;
            color: #00ffff;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #ccc;
            transition: all 0.3s ease;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-item:hover {
            color: #00ffff;
            transform: translateX(5px);
        }

        .info-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            margin-right: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00ffff;
            font-size: 13px;
        }

        .info-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 5px 14px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .bio {
            font-size: 14px;
            color: #bbb;
            line-height: 1.7;
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 10px;
            border-left: 3px solid #00ffff;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding-top: 22px;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #00ffff;
        }

        .link-icon:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .card {
                border-radius: 16px;
            }

            .header {
                padding: 35px 20px;
            }

            .avatar {
                width: 90px;
                height: 90px;
                font-size: 36px;
            }

            .name {
                font-size: 24px;
            }

            .content {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="avatar">👤</div>
            <div class="name">张明</div>
            <div class="title">全栈开发工程师</div>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">About Me</div>
                <div class="bio">热爱编程，专注于Web开发。拥有5年软件开发经验，擅长前后端技术栈，追求优雅的代码和良好的用户体验。乐于分享技术，持续学习成长。</div>
            </div>
            <div class="section">
                <div class="section-title">Contact</div>
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <span class="info-text">zhangming@example.com</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📱</span>
                    <span class="info-text">+86 138 0000 0000</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📍</span>
                    <span class="info-text">北京市朝阳区</span>
                </div>
            </div>
            <div class="section">
                <div class="section-title">Skills</div>
                <div class="tags">
                    <span class="tag">JavaScript</span>
                    <span class="tag">TypeScript</span>
                    <span class="tag">React</span>
                    <span class="tag">Node.js</span>
                    <span class="tag">Python</span>
                    <span class="tag">MongoDB</span>
                    <span class="tag">Vue</span>
                    <span class="tag">Docker</span>
                </div>
            </div>
            <div class="links">
                <div class="link-icon">🔗</div>
                <div class="link-icon">🐙</div>
                <div class="link-icon">💼</div>
            </div>
        </div>
    </div>
</body>
</html>
