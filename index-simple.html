<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍 - 简约风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .title {
            font-size: 14px;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            color: #2c3e50;
        }

        .info-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 12px;
            background-color: #f0f0f0;
            color: #666;
            border-radius: 20px;
            font-size: 12px;
        }

        .bio {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .link-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }

        .link-icon:hover {
            background-color: #2c3e50;
            color: white;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .card {
                border-radius: 12px;
            }

            .header {
                padding: 30px 20px;
            }

            .name {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="avatar">👤</div>
            <div class="name">张明</div>
            <div class="title">全栈开发工程师</div>
        </div>
        <div class="content">
            <div class="section">
                <div class="section-title">个人简介</div>
                <div class="bio">热爱编程，专注于Web开发。拥有5年软件开发经验，擅长前后端技术栈，追求优雅的代码和良好的用户体验。</div>
            </div>
            <div class="section">
                <div class="section-title">联系方式</div>
                <div class="info-item">
                    <span class="info-icon">📧</span>
                    <span class="info-text">zhangming@example.com</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📱</span>
                    <span class="info-text">+86 138 0000 0000</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">📍</span>
                    <span class="info-text">北京市朝阳区</span>
                </div>
            </div>
            <div class="section">
                <div class="section-title">技术栈</div>
                <div class="tags">
                    <span class="tag">JavaScript</span>
                    <span class="tag">TypeScript</span>
                    <span class="tag">React</span>
                    <span class="tag">Node.js</span>
                    <span class="tag">Python</span>
                    <span class="tag">MongoDB</span>
                </div>
            </div>
            <div class="links">
                <div class="link-icon">🔗</div>
                <div class="link-icon">🐙</div>
                <div class="link-icon">💼</div>
            </div>
        </div>
    </div>
</body>
</html>
